version: '3.8'

services:
  royal-banners-api:
    build: .
    container_name: r-banners-api
    restart: always
    environment:
      - PORT=5505
      - NODE_ENV=production
      - DATABASE_URL=postgresql://yeee:Qazplm01@datebase:5432/royal_banners?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - DEV_HOST=${DEV_HOST}
      # 🔥 SENIOR CLEANUP: Cloudinary айнымалыларын алып тастадық, 
      # өйткені біз толығымен локальный SSD дискке көштік.
    ports:
      - "5505:5505"
    # 🔥 SENIOR SECURITY (ФАЙЛДАРДЫ ҚОРҒАУ): 
    # Осы қатардың арқасында барлық жүктелген суреттер мен файлдар 
    # сервердің өзінде (./uploads папкасында) мәңгі сақталады. 
    # Docker өшірілсе де, файлдар аман қалады!
    volumes:
      - ./uploads:/app/uploads
    networks:
      - shared_db_network

networks:
  shared_db_network:
    external: true
    name: universal_db_network